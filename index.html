<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบ PMS</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5f6fa;
      font-family: Arial, sans-serif;
    }

    .app-frame {
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
    }

    .loading {
      position: fixed;
      inset: 0;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-size: 18px;
      color: #333;
    }
  </style>
</head>

<body>
  <div id="loading" class="loading">กำลังโหลดระบบ...</div>

  <iframe
    class="app-frame"
    src="https://script.google.com/macros/s/AKfycbzai-zCBBZ-J0Pd_V_z7apCRvxNqncuuzD-qgozM2ksLq4lybrRdQ5DHf1uHTApNP3g/exec"
    onload="document.getElementById('loading').style.display='none';"
    allowfullscreen>
  </iframe>
</body>
</html>
